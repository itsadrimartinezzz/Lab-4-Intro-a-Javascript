<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>disci-app</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <div class="bg-glow"></div>

  <main class="shell">
    <header class="topbar">
      <div class="brand">
        <h1>disci-app</h1>
        <p class="sub">Controla tus nuevos hábitos</p>
      </div>

      <div class="stats">
        <div class="stat">
          <span class="label">XP Global</span>
          <span id="xpGlobal" class="value">0</span>
        </div>
        <div class="stat">
          <span class="label">Categoría</span>
          <span id="categoria" class="chip">Novato</span>
        </div>
      </div>
    </header>

    <section class="grid">
      <section class="card">
        <h2>Crear misión</h2>

        <form id="missionForm" autocomplete="off">
          <label class="field">
            <span>Nombre</span>
            <input id="nombre" type="text" maxlength="40" />
          </label>

          <label class="field">
            <span>Descripción</span>
            <textarea id="descripcion" rows="3" maxlength="140"></textarea>
          </label>

          <label class="field">
            <span>Dificultad</span>
            <select id="dificultad">
              <option value="FACIL">Fácil (10 XP)</option>
              <option value="NORMAL">Normal (25 XP)</option>
              <option value="DIFICIL">Difícil (50 XP)</option>
            </select>
          </label>

          <button class="btn primary" type="submit">Agregar misión</button>

          <p id="msg" class="msg" aria-live="polite"></p>
        </form>
      </section>

      <section class="card">
        <div class="row">
          <h2>Misiones</h2>
          <div class="mini">
            <span id="totalM" class="mini-pill">0</span>
            <span class="mini-text">total</span>
          </div>
        </div>

        <div id="missionList" class="list"></div>
      </section>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
